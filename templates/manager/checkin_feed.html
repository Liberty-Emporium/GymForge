{% extends "base/manager_base.html" %}
{% block title %}Check-In Feed{% endblock %}

{% block content %}
<div class="space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-bold text-white">Check-In Feed</h1>
      <p class="text-sm text-gray-500">{{ location.name }} · {{ today|date:"d M Y" }}</p>
    </div>
    <span class="text-xs text-gray-500 flex items-center gap-1.5">
      <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse inline-block"></span>
      Auto-refreshes every 30s
    </span>
  </div>

  <div id="checkin-feed"
       hx-get="{% url 'manager:checkin_feed' %}"
       hx-trigger="every 30s"
       hx-swap="innerHTML"
       hx-indicator="#refresh-indicator">
    {% include "manager/partials/checkin_rows.html" %}
  </div>

  <span id="refresh-indicator" class="htmx-indicator text-xs text-gray-500">Refreshing…</span>
</div>
{% endblock %}
