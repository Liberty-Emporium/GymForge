{# HTMX partial — one exercise block with dynamic set rows #}
{# Context: idx (int), set_indices (list of ints, e.g. [0,1,2]), name (str), reps_hint (str optional) #}
<div class="exercise-block bg-gray-800/60 rounded-xl p-3 mb-2" data-exercise-idx="{{ idx }}">
  <div class="flex items-center gap-2 mb-2">
    <input type="text"
           name="exercise_{{ idx }}_name"
           value="{{ name }}"
           placeholder="Exercise name (e.g. Bench Press)"
           required
           class="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white
                  placeholder-gray-500 focus:outline-none focus:border-accent">
    <button type="button"
            onclick="removeExercise(this)"
            class="p-1.5 text-gray-500 hover:text-red-400 transition flex-shrink-0"
            title="Remove exercise">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Set rows rendered from view-supplied set_indices list -->
  <div class="set-rows space-y-1.5 mb-2">
    {% for si in set_indices %}
    <div class="set-row flex items-center gap-2">
      <span class="text-xs text-gray-500 w-9 flex-shrink-0">Set {{ forloop.counter }}</span>
      <input type="number"
             name="exercise_{{ idx }}_set_{{ si }}_reps"
             min="1" max="999"
             placeholder="Reps"
             {% if reps_hint %}value="{{ reps_hint }}"{% endif %}
             class="w-16 bg-gray-900 border border-gray-700 rounded-lg px-2 py-1.5 text-sm text-white
                    placeholder-gray-500 focus:outline-none text-center">
      <input type="number"
             name="exercise_{{ idx }}_set_{{ si }}_weight_kg"
             min="0" max="9999" step="0.5"
             placeholder="kg"
             class="w-16 bg-gray-900 border border-gray-700 rounded-lg px-2 py-1.5 text-sm text-white
                    placeholder-gray-500 focus:outline-none text-center">
      <span class="text-xs text-gray-600">kg</span>
    </div>
    {% endfor %}
  </div>

  <button type="button"
          onclick="addSet(this, {{ idx }})"
          class="text-xs font-medium" style="color:var(--accent)">
    + Add set
  </button>
</div>
