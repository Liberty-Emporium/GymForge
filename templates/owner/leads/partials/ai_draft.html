<!-- Modal card — rendered inside #ai-draft-container (fixed overlay) -->
<div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl w-full max-w-lg">

  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-800">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center"
           style="background-color: var(--accent)">
        <svg class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold text-white">AI Draft Message</p>
        <p class="text-xs text-gray-500">For {{ lead.full_name }} · {{ lead.get_status_display }}</p>
      </div>
    </div>
    <button type="button"
            onclick="document.getElementById('ai-draft-container').classList.add('hidden')"
            class="text-gray-500 hover:text-white transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Draft content -->
  <div class="px-5 py-4">
    <textarea id="ai-draft-text" rows="7"
              class="w-full rounded-xl bg-gray-800 border border-gray-700 px-4 py-3 text-sm text-gray-200 leading-relaxed focus:outline-none resize-none"
    >{{ draft }}</textarea>
  </div>

  <!-- Actions -->
  <div class="px-5 py-4 border-t border-gray-800 flex items-center justify-between gap-3">
    <button type="button"
            onclick="navigator.clipboard.writeText(document.getElementById('ai-draft-text').value).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy to Clipboard',1500)})"
            class="px-4 py-2 rounded-lg text-sm font-medium text-white accent-btn transition-opacity hover:opacity-90">
      Copy to Clipboard
    </button>
    <button type="button"
            onclick="document.getElementById('ai-draft-container').classList.add('hidden')"
            class="text-sm text-gray-400 hover:text-white transition-colors">
      Close
    </button>
  </div>
</div>
