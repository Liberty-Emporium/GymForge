<form hx-post="{% url 'leads:quick_add' %}"
      hx-target="#quick-add-form-wrap"
      hx-swap="innerHTML"
      class="space-y-2">
  {% csrf_token %}

  <div class="grid grid-cols-2 gap-2">
    <div>
      <input type="text" name="first_name"
             value="{{ post.first_name|default:'' }}"
             placeholder="First name *"
             class="w-full rounded-lg bg-gray-800 border {% if errors.first_name %}border-red-500{% else %}border-gray-700{% endif %} px-3 py-2 text-white text-xs focus:outline-none focus:ring-1"
             style="--tw-ring-color: var(--accent)">
      {% if errors.first_name %}<p class="text-xs text-red-400 mt-0.5">{{ errors.first_name }}</p>{% endif %}
    </div>
    <div>
      <input type="text" name="last_name"
             value="{{ post.last_name|default:'' }}"
             placeholder="Last name"
             class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-white text-xs focus:outline-none">
    </div>
  </div>

  <input type="email" name="email"
         value="{{ post.email|default:'' }}"
         placeholder="Email"
         class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-white text-xs focus:outline-none">

  <input type="tel" name="phone"
         value="{{ post.phone|default:'' }}"
         placeholder="Phone"
         class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-white text-xs focus:outline-none">

  <select name="source"
          class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-white text-xs focus:outline-none">
    {% for code, label in sources %}
    <option value="{{ code }}" {% if post.source == code %}selected{% elif not post and code == 'walk_in' %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>

  <textarea name="notes" rows="2"
            placeholder="Notes (optional)"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-white text-xs focus:outline-none resize-none">{{ post.notes|default:'' }}</textarea>

  <div class="flex gap-2">
    <button type="submit"
            class="flex-1 py-2 rounded-lg text-xs font-semibold text-white accent-btn transition-opacity hover:opacity-90">
      Add Lead
    </button>
    <button type="button"
            onclick="document.getElementById('quick-add-panel').classList.add('hidden')"
            class="px-3 py-2 rounded-lg text-xs text-gray-400 bg-gray-800 hover:bg-gray-700 transition-colors">
      Cancel
    </button>
  </div>
</form>
