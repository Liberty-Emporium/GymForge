<div data-plan-row class="bg-gray-900 border border-gray-800 rounded-xl p-4">
  <div class="flex items-center justify-between mb-3">
    <p class="text-sm font-medium text-white">Plan {{ idx|add:1 }}</p>
    {% if idx > 0 %}
    <button type="button" onclick="this.closest('[data-plan-row]').remove()"
            class="text-xs text-gray-500 hover:text-red-400 transition-colors">Remove</button>
    {% endif %}
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Plan Name <span class="text-red-400">*</span></label>
      <input type="text" name="plan_{{ idx }}_name"
             value="{{ plan.name|default:'' }}"
             placeholder="e.g. Basic Membership"
             class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand">
    </div>
    <div>
      <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Price ($)</label>
      <input type="number" name="plan_{{ idx }}_price"
             value="{{ plan.price|default:'' }}"
             placeholder="29.99" step="0.01" min="0"
             class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand">
    </div>
    <div>
      <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Billing Cycle</label>
      <select name="plan_{{ idx }}_billing_cycle"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand">
        {% for val, label in billing_cycles %}
        <option value="{{ val }}" {% if val == plan.billing_cycle %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-xs text-gray-500 uppercase tracking-wide mb-1">Description <span class="text-gray-600">(optional)</span></label>
      <input type="text" name="plan_{{ idx }}_description"
             value="{{ plan.description|default:'' }}"
             placeholder="What's included…"
             class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand">
    </div>
  </div>
</div>
