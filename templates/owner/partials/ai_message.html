<!-- User message -->
<div class="flex gap-3 max-w-2xl ml-auto flex-row-reverse">
  <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 text-xs font-bold text-white"
       style="background-color: var(--primary)">
    {{ request.user.first_name|first|upper|default:"Y" }}
  </div>
  <div class="px-4 py-3 rounded-2xl rounded-tr-sm text-sm text-white" style="background-color: var(--accent)">
    {{ user_message }}
  </div>
</div>

<!-- AI reply -->
<div class="flex gap-3 max-w-2xl">
  <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5"
       style="background-color: var(--accent)">
    <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
    </svg>
  </div>
  <div class="bg-gray-900 border border-gray-800 rounded-2xl rounded-tl-sm px-4 py-3">
    <p class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">{{ reply }}</p>
  </div>
</div>
