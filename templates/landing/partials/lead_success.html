<div id="lead-form-container"
     class="rounded-xl border px-6 py-8 text-center"
     style="border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent)">
  <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-4"
       style="background-color: var(--accent)">
    <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <h3 class="text-xl font-bold text-white mb-2">
    Thanks{% if first_name %}, {{ first_name }}{% endif %}!
  </h3>
  <p class="text-gray-300 text-sm leading-relaxed">
    We've received your request and will be in touch shortly.<br>
    We can't wait to help you reach your goals.
  </p>
</div>
